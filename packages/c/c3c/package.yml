# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : c3c
version    : 0.7.10
release    : 1
source     :
    - https://github.com/c3lang/c3c/archive/refs/tags/v0.7.10.tar.gz : 54bc00eb3ed69d89af80362ef3ee17d30dc7186eccd8b2f4fb9afbf616136115
homepage   : https://c3-lang.org/
license    :
    - MIT
    - LGPL-3.0-or-later
component  : programming
summary    : Compiler for the C3 language 
description: |
    C3 is a programming language that builds on the syntax and semantics of the C language, with the goal of evolving it while still retaining familiarity for C programmers.
clang      : true
builddeps  :
    - pkgconfig(libedit)
    - pkgconfig(libffi)
    - pkgconfig(libxml-2.0) 
    - pkgconfig(libzstd)
    - pkgconfig(zlib)
    - git
    - lld-devel
    - llvm-devel
setup      : |
    %cmake_ninja -DC3_LINK_DYNAMIC=1 \
            -DCMAKE_BUILD_TYPE=Release
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE LICENSE_SRC
